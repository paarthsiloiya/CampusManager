<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description"
              content="CampusManager - Smart Curriculum & Attendance Management System" />
        <meta name="keywords"
              content="campus, curriculum, attendance, management, education" />
        <title>
            {% block title %}CampusManager — Smart Curriculum & Attendance{% endblock %}
        </title>
        <!-- Tailwind -->
        <script src="https://cdn.tailwindcss.com"></script>
        <!-- Google Fonts: Inter -->
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
              rel="stylesheet" />
        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ["Inter", "sans-serif"],
                        },
                        colors: {
                            background: {
                                DEFAULT: 'oklch(var(--color-bg-base))', 
                                dark: 'oklch(var(--color-bg-dark))', 
                                darker: 'oklch(var(--color-bg-darker))', 
                                light: 'oklch(var(--color-bg-light))', 
                                lighter: 'oklch(var(--color-bg-lighter))', 
                            },
                            text: {
                                DEFAULT: 'oklch(var(--color-text-base))', 
                                dark: 'oklch(var(--color-text-dark))',
                                darker: 'oklch(var(--color-text-darker))',
                                light: 'oklch(var(--color-text-light))',
                                lighter: 'oklch(var(--color-text-lighter))',
                            },
                            primary: {
                                DEFAULT: 'oklch(var(--color-primary-base))', 
                                dark: 'oklch(var(--color-primary-dark))', 
                                darker: 'oklch(var(--color-primary-darker))', 
                                light: 'oklch(var(--color-primary-light))',
                                lighter: 'oklch(var(--color-primary-lighter))',
                            },
                            secondary: {
                                DEFAULT: 'oklch(var(--color-secondary-base))', 
                                dark: 'oklch(var(--color-secondary-dark))',
                                darker: 'oklch(var(--color-secondary-darker))',
                                light: 'oklch(var(--color-secondary-light))',
                                lighter: 'oklch(var(--color-secondary-lighter))',
                            },
                            accent: {
                                DEFAULT: 'oklch(var(--color-accent-base))', 
                                dark: 'oklch(var(--color-accent-dark))',
                                darker: 'oklch(var(--color-accent-darker))',
                                light: 'oklch(var(--color-accent-light))',
                                lighter: 'oklch(var(--color-accent-lighter))',
                            },
                            status: {
                                success: 'oklch(var(--color-status-success))',
                                warning: 'oklch(var(--color-status-warning))',
                                error: 'oklch(var(--color-status-error))',
                                info: 'oklch(var(--color-status-info))',
                            }
                        },
                    },
                },
            };
        </script>
        <style>
            :root {
                /* Color Palette - Light Mode Defaults */
                --color-bg-base: 98% 0.005 250;
                --color-bg-dark: 95% 0.01 250;
                --color-bg-darker: 90% 0.02 250;
                --color-bg-light: 99% 0.002 250;
                --color-bg-lighter: 100% 0 0;

                --color-text-base: 20% 0.04 250;
                --color-text-dark: 15% 0.04 250;
                --color-text-darker: 10% 0.04 250;
                --color-text-light: 40% 0.04 250;
                --color-text-lighter: 60% 0.02 250;

                /* Primary Colors (Indigo) */
                --color-primary-base: 50% 0.22 255;
                --color-primary-dark: 42% 0.22 255;
                --color-primary-darker: 35% 0.22 255;
                --color-primary-light: 65% 0.15 255;
                --color-primary-lighter: 85% 0.08 255;

                /* Secondary, Accent, Status */
                --color-secondary-base: 70% 0.1 255;
                --color-secondary-dark: 60% 0.12 255;
                --color-secondary-darker: 50% 0.15 255;
                --color-secondary-light: 85% 0.05 255;
                --color-secondary-lighter: 95% 0.02 255;

                --color-accent-base: 60% 0.25 240;
                --color-accent-dark: 50% 0.25 240;
                --color-accent-darker: 40% 0.25 240;
                --color-accent-light: 75% 0.15 240;
                --color-accent-lighter: 90% 0.05 240;
                
                --color-status-success: 60% 0.18 145;
                --color-status-warning: 75% 0.15 85;
                --color-status-error: 60% 0.2 25;
                --color-status-info: 65% 0.15 240;
            }

            .dark {
                /* Color Palette - Dark Mode Overrides */
                --color-bg-base: 20% 0.02 250;      /* Slate 900ish */
                --color-bg-dark: 15% 0.02 250;      /* Darker */
                --color-bg-darker: 10% 0.02 250;    /* Even Darker */
                --color-bg-light: 25% 0.02 250;     /* Lighter than base */
                --color-bg-lighter: 30% 0.02 250;   /* Lightest background */

                --color-text-base: 90% 0.01 250;    /* Light Grey */
                --color-text-dark: 95% 0.01 250;    /* White-ish */
                --color-text-darker: 100% 0 0;      /* Pure White */
                --color-text-light: 70% 0.02 250;   /* Muted */
                --color-text-lighter: 50% 0.02 250; /* More Muted */
                
                --color-primary-base: 60% 0.22 255;
            }

            /* Global Dark Theme Helpers */
            html.dark body {
                background-color: oklch(var(--color-bg-base));
                color: oklch(var(--color-text-base));
            }

            /* Input & Form Elements in Dark Mode */
            html.dark input:not([type="checkbox"]):not([type="radio"]), 
            html.dark select, 
            html.dark textarea {
                background-color: oklch(var(--color-bg-darker)) !important;
                border-color: #374151 !important;
                color: oklch(var(--color-text-base)) !important;
            }
            html.dark input:focus, html.dark select:focus, html.dark textarea:focus {
                 border-color: oklch(var(--color-primary-base)) !important;
            }
            html.dark ::placeholder {
                color: oklch(var(--color-text-lighter)) !important;
            }
            html.dark .bg-white {
                 background-color: oklch(var(--color-bg-dark)) !important;
                 border-color: #374151 !important;
            }

            /* Custom scrollbar styling for auth pages too */
            html,
            body {
                height: 100%;
            }
        </style>
        <!-- Theme Initialization -->
        <script>
            (function () {
                try {
                    const theme = localStorage.getItem('theme');
                    const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    if (theme === 'dark' || (!theme && systemDark)) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }
                } catch (e) {}
            })();
        </script>
    </head>
    <body class="min-h-screen bg-background relative font-sans antialiased text-text selection:bg-accent selection:text-white flex flex-col items-center justify-center p-4">
        <!-- Decorational background elements -->
        <div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
            <div class="absolute -top-1/2 -left-1/2 w-full h-full bg-gradient-to-br from-primary-lighter/20 to-transparent rounded-full blur-3xl opacity-50">
            </div>
            <div class="absolute -bottom-1/2 -right-1/2 w-full h-full bg-gradient-to-tl from-accent-lighter/20 to-transparent rounded-full blur-3xl opacity-50">
            </div>
        </div>
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="fixed top-6 right-6 z-50 space-y-3 w-full max-w-sm">
                    {% for category, message in messages %}
                        <div class="p-4 rounded-xl shadow-lg border border-opacity-20 flex items-start gap-3 backdrop-blur-md animate-bounce-in {% if category == 'error' %}bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800/50 text-red-600 dark:text-red-400{% else %}bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800/50 text-green-600 dark:text-green-400{% endif %}">
                            <div class="flex-1 text-sm font-medium">{{ message }}</div>
                            <button type="button"
                                    class="text-current opacity-60 hover:opacity-100 transition-opacity"
                                    onclick="this.parentElement.style.display = 'none'">
                                <span class="sr-only">Close</span>
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                </svg>
                            </button>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        <div class="w-full max-w-md">
            {% block content %}{% endblock %}
        </div>
        {% block scripts %}{% endblock %}
    </body>
</html>
