{% extends "base.html" %}
{% block title %}Settings — CampusManager{% endblock %}
{% block sidebar_content %}
    <div class="bg-white dark:bg-background-dark rounded-2xl p-6 border border-gray-100 dark:border-gray-800 shadow-sm w-full h-full lg:h-auto">
        <h3 class="font-bold text-text-dark dark:text-text-base mb-4 flex items-center gap-2">
            <i data-feather="shield" class="w-4 h-4 text-primary"></i> Security Status
        </h3>
        <div class="space-y-4">
            <div class="p-3 bg-green-50 dark:bg-green-900/20 rounded-xl border border-green-100 dark:border-green-800">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-green-100 dark:bg-green-800 flex items-center justify-center text-green-600 dark:text-green-300">
                        <i data-feather="lock" class="w-4 h-4"></i>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-green-700 dark:text-green-400 uppercase">Password</p>
                        <p class="text-sm font-medium text-green-900 dark:text-green-200">Strong</p>
                    </div>
                </div>
            </div>
            <div class="p-3 bg-blue-50 dark:bg-blue-900/20 rounded-xl border border-blue-100 dark:border-blue-800">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-blue-100 dark:bg-blue-800 flex items-center justify-center text-blue-600 dark:text-blue-300">
                        <i data-feather="shield-check" class="w-4 h-4"></i>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-blue-700 dark:text-blue-400 uppercase">Role</p>
                        <p class="text-sm font-medium text-blue-900 dark:text-blue-200">Administrator</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
{% block content %}
    <div id="settings-container">{% include "Admin/_settings_content.html" %}</div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof feather !== "undefined") {
                feather.replace();
            }
        });
    </script>
{% endblock %}
