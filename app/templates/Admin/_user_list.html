{% for user in users %}
    <tr class="group hover:bg-gray-50/50 dark:hover:bg-background-light transition-colors">
        <td class="p-5">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-full bg-gray-100 dark:bg-background-darker flex items-center justify-center text-text-lighter font-bold text-lg">
                    {{ user.name[0] | upper }}
                </div>
                <div>
                    <h3 class="font-bold text-text-dark dark:text-text-base group-hover:text-primary transition-colors">
                        {{ user.name }}
                    </h3>
                    <p class="text-xs text-gray-500 dark:text-gray-400">{{ user.email }}</p>
                </div>
            </div>
        </td>
        <td class="p-5">
            <span class="px-3 py-1 rounded-lg text-xs font-bold uppercase tracking-wider {% if user.role.name == 'ADMIN' %}bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-400{% elif user.role.name == 'TEACHER' %}bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400{% else %}bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400{% endif %}">
                {{ user.role.name }}
            </span>
        </td>
        <td class="p-5">
            <div class="text-sm font-medium text-gray-600 dark:text-gray-400">
                {% if user.phone %}
                    <div class="flex items-center gap-2">
                        <i data-feather="phone" class="w-3 h-3"></i> {{ user.phone }}
                    </div>
                {% else %}
                    <span class="text-gray-400 dark:text-gray-500 italic">No phone</span>
                {% endif %}
            </div>
        </td>
        <td class="p-5 text-right">
            <a href="{{ url_for('views.edit_user', user_id=user.id) }}"
               class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-gray-100 dark:bg-gray-700 text-text-light dark:text-gray-300 hover:bg-primary/10 dark:hover:bg-primary/20 hover:text-primary dark:hover:text-primary transition-colors"
               title="Edit User">
                <i data-feather="edit-2" class="w-4 h-4"></i>
            </a>
        </td>
    </tr>
{% else %}
    <tr>
        <td colspan="4" class="p-12 text-center">
            <div class="w-16 h-16 bg-gray-50 dark:bg-gray-800 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-300 dark:text-gray-600">
                <i data-feather="users" class="w-8 h-8"></i>
            </div>
            <h3 class="text-lg font-bold text-text-dark dark:text-white">No users found</h3>
            <p class="text-text-light dark:text-gray-400">Try adjusting your search criteria.</p>
        </td>
    </tr>
{% endfor %}
