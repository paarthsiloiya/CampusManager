<form action="{{ url_for("views.add_user") }}"
      method="post"
      class="animate-fadeIn">
    <!-- Role Selection -->
    <div class="space-y-2 mb-6">
        <label for="roleSelect"
               class="text-xs font-bold text-text-dark dark:text-gray-300 uppercase tracking-wide">
            Select Role <span class="text-red-500">*</span>
        </label>
        <div class="relative">
            <select name="role"
                    id="roleSelect"
                    required
                    onchange="toggleFields()"
                    class="w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 text-text-dark dark:text-white font-medium focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all appearance-none cursor-pointer">
                <option value="TEACHER">Teacher</option>
                <option value="STUDENT">Student</option>
                <option value="ADMIN">Admin</option>
            </select>
            <i data-feather="chevron-down"
               class="w-4 h-4 text-gray-400 dark:text-gray-500 absolute right-4 top-3.5 pointer-events-none"></i>
        </div>
    </div>
    <!-- Common Fields -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <div class="space-y-2">
            <label class="text-xs font-bold text-text-dark dark:text-gray-300 uppercase tracking-wide">
                Full Name <span class="text-red-500">*</span>
            </label>
            <input type="text"
                   name="name"
                   required
                   class="w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 text-text-dark dark:text-white font-medium focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all"
                   placeholder="John Doe" />
        </div>
        <div class="space-y-2">
            <label class="text-xs font-bold text-text-dark dark:text-gray-300 uppercase tracking-wide">
                Work Email <span class="text-red-500">*</span>
            </label>
            <input type="email"
                   name="email"
                   required
                   class="w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 text-text-dark dark:text-white font-medium focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all"
                   placeholder="email@college.edu" />
        </div>
        <div class="space-y-2">
            <label class="text-xs font-bold text-text-dark dark:text-gray-300 uppercase tracking-wide">Phone Number</label>
            <input type="text"
                   name="phone"
                   class="w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 text-text-dark dark:text-white font-medium focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all"
                   placeholder="+91..." />
        </div>
        <div class="space-y-2">
            <label class="text-xs font-bold text-text-dark dark:text-gray-300 uppercase tracking-wide">
                Temporary Password <span class="text-red-500">*</span>
            </label>
            <input type="text"
                   name="password"
                   required
                   class="w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 text-text-dark dark:text-white font-medium focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all"
                   value="password123" />
        </div>
    </div>
    <!-- Student Specific Fields -->
    <div id="studentFields"
         class="hidden space-y-6 pt-6 border-t border-gray-100 dark:border-gray-800 mb-6">
        <h3 class="font-bold text-text-dark dark:text-text-base flex items-center gap-2">
            <i data-feather="book" class="w-4 h-4 text-primary"></i> Student Information
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <label class="text-xs font-bold text-text-dark dark:text-gray-300 uppercase tracking-wide">
                    Enrollment Number <span class="text-red-500">*</span>
                </label>
                <input type="text"
                       name="enrollment_number"
                       class="w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 text-text-dark dark:text-white font-medium focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" />
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-text-dark dark:text-gray-300 uppercase tracking-wide">Date of Birth</label>
                <input type="date"
                       name="student_dob"
                       class="w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 text-text-dark dark:text-white font-medium focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" />
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-text-dark dark:text-gray-300 uppercase tracking-wide">
                    Branch <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <select name="student_branch"
                            class="w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 text-text-dark dark:text-white font-medium focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all appearance-none cursor-pointer">
                        {% for branch in Branch %}<option value="{{ branch.value }}">{{ branch.value }}</option>{% endfor %}
                    </select>
                    <i data-feather="chevron-down"
                       class="w-4 h-4 text-gray-400 dark:text-gray-500 absolute right-4 top-3.5 pointer-events-none"></i>
                </div>
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-text-dark dark:text-gray-300 uppercase tracking-wide">
                    Semester <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <select name="semester"
                            class="w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 text-text-dark dark:text-white font-medium focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all appearance-none cursor-pointer">
                        {% for i in range(1, 9) %}<option value="{{ i }}">Semester {{ i }}</option>{% endfor %}
                    </select>
                    <i data-feather="chevron-down"
                       class="w-4 h-4 text-gray-400 dark:text-gray-500 absolute right-4 top-3.5 pointer-events-none"></i>
                </div>
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-text-dark dark:text-gray-300 uppercase tracking-wide">Institution</label>
                <input type="text"
                       name="institution"
                       value="Delhi Technical Campus"
                       class="w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 text-text-dark dark:text-white font-medium focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" />
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-text-dark dark:text-gray-300 uppercase tracking-wide">Graduation Year</label>
                <input type="number"
                       name="graduation_year"
                       value="2026"
                       class="w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 text-text-dark dark:text-white font-medium focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" />
            </div>
        </div>
    </div>
    <!-- Teacher Specific Fields -->
    <div id="teacherFields"
         class="hidden space-y-6 pt-6 border-t border-gray-100 dark:border-gray-800 mb-6">
        <h3 class="font-bold text-text-dark dark:text-text-base flex items-center gap-2">
            <i data-feather="briefcase" class="w-4 h-4 text-primary"></i> Teacher Information
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <label class="text-xs font-bold text-text-dark dark:text-gray-300 uppercase tracking-wide">Department</label>
                <div class="relative">
                    <select name="department"
                            class="w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 text-text-dark dark:text-white font-medium focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all appearance-none cursor-pointer">
                        <option value="">Select Department</option>
                        {% for branch in Branch %}<option value="{{ branch.value }}">{{ branch.value }}</option>{% endfor %}
                        <option value="Applied Sciences">Applied Sciences</option>
                    </select>
                    <i data-feather="chevron-down"
                       class="w-4 h-4 text-gray-400 dark:text-gray-500 absolute right-4 top-3.5 pointer-events-none"></i>
                </div>
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-text-dark dark:text-gray-300 uppercase tracking-wide">Date of Birth</label>
                <input type="date"
                       name="teacher_dob"
                       class="w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 text-text-dark dark:text-white font-medium focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" />
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-text-dark dark:text-gray-300 uppercase tracking-wide">Institution</label>
                <input type="text"
                       name="teacher_institution"
                       value="Delhi Technical Campus"
                       class="w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 text-text-dark dark:text-white font-medium focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" />
            </div>
        </div>
    </div>
    <div class="pt-4 flex justify-end">
        <button type="submit"
                class="px-8 py-3 rounded-xl bg-primary text-white font-bold hover:bg-primary-dark hover:scale-105 transition-all shadow-lg shadow-primary/20">
            Create User
        </button>
    </div>
</form>
