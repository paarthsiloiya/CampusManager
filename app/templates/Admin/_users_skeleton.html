{% from "components/skeletons.html" import table_row, card %}
<div class="space-y-4 animate-in fade-in duration-500">
    <!-- Desktop Table Skeleton -->
    <div class="hidden md:block bg-white dark:bg-background-dark rounded-3xl border border-gray-100 dark:border-gray-800 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-gray-100 dark:border-gray-800 bg-gray-50/50 dark:bg-background-lighter">
                        <th class="p-5 text-xs font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wide">User Info</th>
                        <th class="p-5 text-xs font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wide">Role</th>
                        <th class="p-5 text-xs font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wide">Contact</th>
                        <th class="p-5 text-xs font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wide text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
                    {% for _ in range(5) %}{{ table_row(4) }}{% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    <!-- Mobile Cards Skeleton -->
    <div class="md:hidden space-y-3">
        {% for _ in range(3) %}{{ card() }}{% endfor %}
    </div>
</div>
